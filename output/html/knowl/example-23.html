<p>Solve \(2^x = 8 \sqrt[3]{2}\text{.}\)</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{align*}
2^x \amp = 2^3 \cdot 2^{1/3} \amp\amp \text{writing both sides as a power of 2}\\
2^x \amp = 2^{10/3} \amp\amp \text{exponent laws}\\
x \amp = 10/3 \amp\amp \text{equating exponents}
\end{align*}
