<h4 class="heading"><span class="type">Paragraph</span></h4>
<p>For horizontal shifts, the signs are opposite. A positive number inside the argument corresponds to a shift in the “negative” \(x\)-direction, that is, to the left. Similarly, a negative number corresponds to a shift in the “positive” \(x\)-direction, that is, to the right.</p>
