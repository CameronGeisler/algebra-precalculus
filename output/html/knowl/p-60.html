<p>For \(p, q\) to satisfy this equation, the coefficients must be equal. That is, \(p + q = b\text{,}\) and \(pq = c\text{.}\) This means that \(p\) and \(q\) must be numbers whose product is the constant term \(c\text{,}\) and whose sum is the middle coefficient \(b\text{.}\)</p>
