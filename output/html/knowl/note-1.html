<span class="type">Note</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">3.2.4</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>
</h4>
<p>This property follows from the fact that the exponential function \(f(x) = b^x\) is one-to-one. Recall that \(f\) is one-to-one if \(f(x) = f(y)\) implies \(x = y\text{.}\) In this way, if \(b^x = b^y\text{,}\) then \(x = y\text{.}\)</p></article><span class="incontext"><a href="section-ITEE.html#note-1">in-context</a></span>
