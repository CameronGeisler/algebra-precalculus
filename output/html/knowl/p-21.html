<h4 class="heading"><span class="type">Paragraph</span></h4>
<p>The graph of a quadratic function is a curve called a <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">parabola</dfn>. It has the shape of a “bowl”, or a U-shape. A parabola has particular characteristics. Consider a quadratic function of the form \(y = ax^2 + bx + c\text{.}\)</p>
