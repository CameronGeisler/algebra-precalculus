<article class="fact theorem-like"><h4 class="heading">
<span class="type">Fact</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">1.2.1</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="title">Square root property.</span>
</h4>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{\text{if $x^2 = k$, then $x = \pm \sqrt{k}$ ($x = \sqrt{k}$ or $x = -\sqrt{k}$)}}
\end{equation*}
</div>
<p>This is true, provided that \(k &gt; 0\text{.}\)</p></article><span class="incontext"><a href="section-ITQE.html#fact-1">in-context</a></span>
