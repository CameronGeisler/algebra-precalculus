<dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">Axis of symmetry</dfn>. Parabolas are symmetric, in that they are made of up of two “halves” which are mirror images of each other. In particular, they are symmetric about the vertical line which passes through the vertex of the parabola, called the <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">axis of symmetry</dfn>.</article><span class="incontext"><a href="section-ITQF.html#li-3">in-context</a></span>
