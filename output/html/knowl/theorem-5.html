<p>Let \(ax^2 + bx + c = 0\) be a quadratic equation with integer coefficients (or rational coefficients). If \(b^2 - 4ac &gt; 0\) is a perfect square, then the equation has 2 rational solutions.</p></article><span class="incontext"><a href="section-TQF.html#theorem-5">in-context</a></span>
