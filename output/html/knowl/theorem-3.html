<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">1.7.1</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="title">The quadratic formula.</span>
</h4>
<p>Let \(ax^2 + bx + c = 0\) be a quadratic equation, \(a \neq 0\text{.}\) Then, the solutions are given by,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}}
\end{equation*}
