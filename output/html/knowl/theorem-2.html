<p>The vertex of the quadratic function \(f(x) = ax^2 + bx + c\) is given by,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{(h,k) = \brac{-\frac{b}{2a}, f\brac{-\frac{b}{2a}}} = \brac{-\frac{b}{2a}, \frac{4ac - b^2}{4a}}}
\end{equation*}
