<p>Consider the equation \(2^x = 32\text{.}\) Here, the variable \(x\) is an exponent. Writing 32 as \(2^5\text{,}\) a power of 2, we get \(2^x = 2^5\text{,}\) and so \(x = 5\text{.}\)</p></article><span class="incontext"><a href="section-ITEE.html#example-7">in-context</a></span>
